name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Pre-Clean Conflicting Configurations
        run: |
          rm -rf capacitor.config.ts capacitor.config.json

      - name: Unzip Project Files
        run: |
          unzip "pos.zip--صيدلي-برو" -d temp_unzip || unzip *.zip -d temp_unzip || true
          TARGET_DIR=$(find temp_unzip -name "package.json" -exec dirname {} \;)
          if [ -n "$TARGET_DIR" ]; then
            echo "Found project files in: $TARGET_DIR"
            cp -r $TARGET_DIR/* .
          else
            echo "Error: package.json not found!"
            exit 1
          fi
          rm -rf temp_unzip

      - name: Deep Clean Environment
        run: |
          rm -rf node_modules package-lock.json dist android
          find . -name "capacitor.config.ts" -delete
          find . -name "capacitor.config.json" -delete

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install --force

      - name: Build Web Application
        run: npm run build

      - name: Install Capacitor CLI, Core & Push Plugins
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          # تثبيت الإشعارات المحلية والفورية معاً لضمان تغطية كافة أنواع الاستدعاءات البرمجية
          npm install @capacitor/local-notifications@latest @capacitor/push-notifications@latest

      - name: Initialize Capacitor Android
        run: |
          npx cap init "Saydali Pro POS" "com.saydalipro.pos" --web-dir=dist
          npx cap add android
          npx cap sync android

      - name: Advanced Fix for Web Notifications & Permissions
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          if [ -f "$MANIFEST_PATH" ]; then
            echo "Injecting Android Manifest Permissions for Notifications..."
            
            # 1. حقن صلاحيات الإشعارات والانترنت والوصول الكامل للخلفية لمنع توقف الإشعارات
            sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />' $MANIFEST_PATH
            
            # 2. السماح للمتصفح الداخلي بقبول النوافذ المنبثقة والبرمجيات الحساسة
            sed -i 's/android:hardwareAccelerated="true"/android:hardwareAccelerated="true" android:domStorageEnabled="true"/' $MANIFEST_PATH
          fi

      - name: Force WebView to Enable Javascript & Web Notifications
        run: |
          # تعديل ملف MainActivity لتفعيل الإشعارات ودعم الـ Bridges برمجياً داخل بيئة أندرويد
          MAIN_ACTIVITY_PATH=$(find android/app/src/main -name "MainActivity.java")
          if [ -n "$MAIN_ACTIVITY_PATH" ]; then
            echo "Configuring MainActivity.java for Web Notifications..."
            # تأكيد تحميل مكتبات الملحقات تلقائياً
            sed -i '/public class MainActivity extends BridgeActivity/i import android.os.Bundle;\nimport com.getcapacitor.plugin.util.AssetUtil;' $MAIN_ACTIVITY_PATH
          fi

      - name: Update Kotlin & Gradle Versions for Java 21
        run: |
          cd android
          if [ -f "build.gradle" ]; then
            sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' build.gradle
            sed -i 's/kotlin_version = .*/kotlin_version = "1.9.24"/g' build.gradle
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.project.android.useAndroidX=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saydali-Pro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
